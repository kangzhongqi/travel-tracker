<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北京地铁打卡地图</title>
<style>
:root {
    --bg: #1a1d23;
    --panel-bg: #21252b;
    --text: #cdd6e0;
    --text-secondary: #7f8c9a;
    --accent: #4ea397;
    --danger: #e0556a;
    --border: #2d3139;
    --radius: 10px;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; overflow: hidden;
    user-select: none; -webkit-user-select: none;
}

/* Loading */
#loading {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg); display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.4s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { color: var(--text-secondary); font-size: 14px; }

/* App layout */
#app {
    display: flex; height: 100vh;
    opacity: 0; transition: opacity 0.3s ease;
}
#app.ready { opacity: 1; }

#map-area { flex: 1; position: relative; min-width: 0; }
#subway-canvas {
    display: block; width: 100%; height: 100%;
    cursor: grab;
}
#subway-canvas:active { cursor: grabbing; }
#subway-canvas.panning { cursor: grabbing; }

/* Search overlay */
#search-wrap {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%); z-index: 10;
    width: 340px; max-width: calc(100% - 24px);
}
#search-box {
    display: flex; align-items: center;
    background: var(--panel-bg); border-radius: 20px;
    box-shadow: var(--shadow); padding: 0 14px;
    border: 1px solid var(--border);
}
#search-box:focus-within { border-color: var(--accent); }
#search-box input {
    flex: 1; border: none; outline: none;
    padding: 10px 6px; font-size: 13px;
    background: transparent; color: var(--text);
}
#search-box input::placeholder { color: #4a5058; }
#search-box .icon { color: #4a5058; font-size: 14px; margin-right: 4px; }
#search-results {
    display: none; position: absolute; top: 100%; left: 0; right: 0;
    margin-top: 6px; background: var(--panel-bg);
    border-radius: var(--radius); box-shadow: var(--shadow);
    max-height: 240px; overflow-y: auto; border: 1px solid var(--border);
}
#search-results.show { display: block; }
#search-results .item {
    padding: 9px 14px; cursor: pointer; font-size: 12px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
}
#search-results .item:last-child { border-bottom: none; }
#search-results .item:hover { background: #2a2e36; }
#search-results .item .line-tags { display: flex; gap: 3px; }
#search-results .item .line-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
    color: #fff; white-space: nowrap;
}
#search-results .no-result {
    padding: 16px; text-align: center; color: var(--text-secondary); font-size: 13px;
}

/* Tooltip */
#tooltip {
    position: absolute; pointer-events: none; z-index: 20;
    background: #2c313a; color: #fff; padding: 8px 14px;
    border-radius: 8px; font-size: 12px; box-shadow: var(--shadow);
    display: none; white-space: nowrap;
    border: 1px solid var(--border);
}
#tooltip .tt-name { font-weight: 600; font-size: 13px; }
#tooltip .tt-lines { display: flex; gap: 3px; margin-top: 4px; }
#tooltip .tt-line {
    font-size: 10px; padding: 1px 6px; border-radius: 8px; color: #fff;
}
#tooltip .tt-hint { font-size: 10px; color: var(--text-secondary); margin-top: 3px; }

/* Toast */
#toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-120px);
    z-index: 10000; padding: 10px 20px;
    border-radius: 20px; font-size: 13px;
    background: #3c4048; color: #fff;
    box-shadow: var(--shadow);
    transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* Panel */
#panel {
    width: 300px; background: var(--panel-bg);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; z-index: 5;
}
.panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
}
.panel-header h2 { font-size: 16px; font-weight: 700; }
.panel-header .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

.section {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    color: var(--text-secondary); letter-spacing: 0.5px; margin-bottom: 10px;
}

/* Progress */
.progress-wrap { margin-bottom: 4px; }
.progress-outer {
    height: 5px; background: #2d3139; border-radius: 3px; overflow: hidden;
}
.progress-inner {
    height: 100%; background: var(--accent);
    border-radius: 3px; transition: width 0.4s ease;
}
.progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-secondary); margin-top: 4px;
}

/* Line stats */
.line-stat {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; font-size: 11px;
}
.line-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.line-stat .name { flex: 1; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.line-stat .count { color: var(--text-secondary); flex-shrink: 0; }
.line-stat .pct { width: 36px; text-align: right; color: var(--text-secondary); flex-shrink: 0; }

/* Buttons */
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
.btn {
    padding: 7px 14px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; cursor: pointer;
    background: #2a2e36; color: var(--text);
    transition: all 0.15s ease; white-space: nowrap;
}
.btn:hover { background: #353a44; }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: #3d8a7e; }
.btn.danger { color: var(--danger); border-color: #4a3036; }
.btn.danger:hover { background: #3a2228; }
.btn.small { padding: 4px 10px; font-size: 11px; }

/* Modal */
.modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.5);
    align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
    background: var(--panel-bg); border-radius: var(--radius);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    padding: 20px; max-width: 380px; width: 90%; border: 1px solid var(--border);
}
.modal h3 { font-size: 15px; margin-bottom: 10px; }
.modal p { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
.modal .btn-row { justify-content: flex-end; }

/* Legend */
#legend {
    position: absolute; bottom: 12px; left: 12px; z-index: 10;
    background: rgba(33,37,43,0.92); border-radius: 8px;
    padding: 8px 12px; display: flex; gap: 16px; font-size: 11px;
    border: 1px solid var(--border);
}
.legend-item { display: flex; align-items: center; gap: 5px; color: var(--text-secondary); }
.legend-dot {
    width: 10px; height: 10px; border-radius: 50%; border: 2px solid #666;
    background: transparent;
}
.legend-dot.visited { background: var(--accent); border-color: var(--accent); }

/* Zoom controls */
#zoom-controls {
    position: absolute; bottom: 12px; right: 12px; z-index: 10;
    display: flex; flex-direction: column; gap: 4px;
}
.zoom-btn {
    width: 32px; height: 32px; border-radius: 6px;
    border: 1px solid var(--border); background: rgba(33,37,43,0.92);
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
}
.zoom-btn:hover { background: #353a44; }

/* Mobile */
@media (max-width: 768px) {
    #app { flex-direction: column; }
    #map-area { height: 55vh; }
    #panel { width: 100%; height: 45vh; border-left: none; border-top: 1px solid var(--border); }
    #search-wrap { top: 6px; width: calc(100% - 56px); }
    #zoom-controls { bottom: 8px; right: 8px; }
    #legend { bottom: 8px; left: 8px; font-size: 10px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #353a44; border-radius: 2px; }
</style>
</head>

<div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">正在加载北京地铁数据...</p>
</div>

<div id="toast"></div>

<div class="modal-overlay" id="clear-modal">
    <div class="modal">
        <h3>⚠️ 确认清除</h3>
        <p>将清除全部地铁打卡数据。建议先导出备份。</p>
        <div class="btn-row">
            <button class="btn" onclick="closeModal()">取消</button>

</div>

<div id="app">

    <div id="panel">
        <div class="panel-header">

        <div class="section">

        </div>
        <div class="section">

            <div id="line-stats"></div>
        </div>
        <div class="section">
            <div class="section-title">⚙️ 数据管理</div>
            <div class="btn-row">
                <button class="btn primary" id="btn-export">📤 导出</button>
                <button class="btn" id="btn-import">📥 导入</button>
                <button class="btn danger" id="btn-clear">🗑 清除</button>
            </div>
            <input type="file" id="import-file" accept=".json" style="display:none">
        </div>
    </div>
</div>

const STORAGE_KEY = 'beijing_subway_visited';
const STATION_RADIUS = 9;
const TRANSFER_RADIUS = 13;
const HIT_RADIUS = 16;
const LABEL_ZOOM_THRESHOLD = 1.4;

// State
let subwayData = null;
let visitedSet = new Set();
let scale, offsetX, offsetY;
let canvas, ctx;
let dpr = window.devicePixelRatio || 1;
let hoveredStation = null;
let isPanning = false;
let panStart = null;
let lastOffset = null;
let animationId = null;

// Cached rendering data
let stationPositions = []; // [{name, x, y, lines, isTransfer}]
let linePaths = [];        // [{name, color, paths: [[x,y],...], stations: [name,...]}]
let stationIndex = {};     // name -> station object

// DOM
const $ = (s) => document.querySelector(s);
const loadingEl = $('#loading');
const loadingText = $('#loading-text');
const appEl = $('#app');

// ===== Toast =====
let toastTimer;
function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = 'show';
    toastTimer = setTimeout(() => { toast.className = ''; }, 2000);
}

// ===== localStorage =====
function loadVisited() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            const data = JSON.parse(raw);
            if (Array.isArray(data.visited)) visitedSet = new Set(data.visited);
        }
    } catch(e) { visitedSet = new Set(); }
}

function saveVisited() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            visited: Array.from(visitedSet),
            lastModified: new Date().toISOString()
        }));
    } catch(e) { showToast('保存失败'); }
}

// ===== Data Loading =====
function loadData() {
    subwayData = SUBWAY_DATA;

    // Build indices
    stationIndex = {};
    stationPositions = subwayData.stations.map(s => {
        const obj = {
            name: s.name,
            x: s.pos_x,
            y: s.pos_y,
            lines: s.lines,
            isTransfer: s.is_transfer || s.lines.length > 1
        };
        stationIndex[s.name] = obj;
        return obj;
    });

    linePaths = subwayData.lines.map(l => ({
        name: l.name,
        shortName: l.short_name,
        color: l.color,
        paths: l.path.length > 0 ? [l.path] : [],
        altPaths: (l.alt_paths || []).filter(p => p.length > 0),
        stations: l.stations.filter(s => stationIndex[s])
    }));
}

// ===== Canvas Setup =====
function resizeCanvas() {
    const rect = canvasEl.parentElement.getBoundingClientRect();
    canvasEl.width = rect.width * dpr;
    canvasEl.height = rect.height * dpr;
    canvasEl.style.width = rect.width + 'px';
    canvasEl.style.height = rect.height + 'px';
    ctx = canvasEl.getContext('2d');
}

function worldToScreen(wx, wy) {
    return {
        x: (wx + offsetX) * scale * dpr,
        y: (wy + offsetY) * scale * dpr
    };
}

function screenToWorld(sx, sy) {
    const rect = canvasEl.getBoundingClientRect();
    return {
        x: (sx - rect.left) / scale - offsetX,
        y: (sy - rect.top) / scale - offsetY
    };
}

function fitToScreen() {
    if (!subwayData) return;
    const b = subwayData.bbox;
    const pad = 60;
    const worldW = b.max_x - b.min_x + pad * 2;
    const worldH = b.max_y - b.min_y + pad * 2;
    const rect = canvasEl.parentElement.getBoundingClientRect();
    const sx = rect.width / worldW;
    const sy = rect.height / worldH;
    scale = Math.min(sx, sy, 1.5);
    offsetX = -(b.min_x - pad) + (rect.width / scale - (b.max_x - b.min_x + pad * 2)) / 2;
    offsetY = -(b.min_y - pad) + (rect.height / scale - (b.max_y - b.min_y + pad * 2)) / 2;
}

// ===== Rendering =====
function render() {
    if (!ctx || !subwayData) return;
    const W = canvasEl.width;
    const H = canvasEl.height;
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#1a1d23';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.scale(dpr, dpr);
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, offsetX * scale * dpr, offsetY * scale * dpr);

    // Draw lines
    for (const line of linePaths) {
        const allPaths = [line.paths[0] || [], ...(line.altPaths || [])].filter(p => p.length >= 2);

        for (const path of allPaths) {
            ctx.beginPath();
            ctx.moveTo(path[0][0], path[0][1]);
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(path[i][0], path[i][1]);
            }
            ctx.strokeStyle = line.color;
            ctx.lineWidth = allPaths.length > 1 ? 3 : 5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalAlpha = 0.85;
            ctx.stroke();

            // Inner highlight
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = allPaths.length > 1 ? 1 : 2;
            ctx.globalAlpha = 0.4;
            ctx.stroke();
        }
    }
    ctx.globalAlpha = 1;

    // Draw stations
    for (const st of stationPositions) {
        const isVisited = visitedSet.has(st.name);
        const isHovered = hoveredStation === st.name;
        const r = st.isTransfer ? TRANSFER_RADIUS : STATION_RADIUS;

        // Outer glow for hover
        if (isHovered) {
            ctx.beginPath();
            ctx.arc(st.x, st.y, r + 6, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fill();
        }

        // Station circle
        ctx.beginPath();
        ctx.arc(st.x, st.y, r, 0, Math.PI * 2);

        if (isVisited) {
            // Filled with primary line color
            const mainColor = st.lines.length > 0
                ? (linePaths.find(l => l.name === st.lines[0]) || {}).color || '#4ea397'
                : '#4ea397';
            ctx.fillStyle = mainColor;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
        } else {
            // White/transparent fill with line-colored border
            ctx.fillStyle = '#282c34';
            ctx.fill();
            const borderColor = st.lines.length > 0
                ? (linePaths.find(l => l.name === st.lines[0]) || {}).color || '#666'
                : '#666';
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 2.5;
            ctx.stroke();
        }

        // Transfer station: small ring segments for additional lines
        if (st.isTransfer && st.lines.length > 1) {
            const adtlLines = st.lines.slice(1, 4); // Show up to 3 more
            adtlLines.forEach((ln, i) => {
                const lnColor = (linePaths.find(l => l.name === ln) || {}).color;
                if (!lnColor) return;
                const angle = (i / adtlLines.length) * Math.PI * 2;
                const arcR = r + 3;
                ctx.beginPath();
                ctx.arc(st.x, st.y, arcR, angle, angle + Math.PI / adtlLines.length - 0.15);
                ctx.strokeStyle = lnColor;
                ctx.lineWidth = 2.5;
                ctx.stroke();
            });
        }
    }

    // Draw labels when zoomed in
    if (scale >= LABEL_ZOOM_THRESHOLD) {
        ctx.fillStyle = '#8b94a3';
        ctx.font = `${Math.max(10, 12 / Math.sqrt(scale))}px "PingFang SC","Microsoft YaHei",sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        const labelAlpha = Math.min(1, (scale - LABEL_ZOOM_THRESHOLD) / 0.5);
        ctx.globalAlpha = labelAlpha;

        for (const st of stationPositions) {
            if (st.isTransfer || scale > 2.0) {
                const r = st.isTransfer ? TRANSFER_RADIUS : STATION_RADIUS;
                ctx.fillText(st.name, st.x, st.y + r + 4);
            }
        }
        ctx.globalAlpha = 1;
    }

    ctx.restore();
}

// ===== Interaction =====
function getHitStation(sx, sy) {
    const world = screenToWorld(sx, sy);
    // Check in reverse order for overlapping stations
    for (let i = stationPositions.length - 1; i >= 0; i--) {
        const st = stationPositions[i];
        const dx = world.x - st.x;
        const dy = world.y - st.y;
        if (Math.sqrt(dx * dx + dy * dy) < HIT_RADIUS) {
            return st;
        }
    }
    return null;
}

function handleStationClick(st) {
    if (visitedSet.has(st.name)) {
        visitedSet.delete(st.name);
    } else {
        visitedSet.add(st.name);
    }
    saveVisited();
    render();
    refreshStats();
    refreshLineStats();
}

canvasEl.addEventListener('click', (e) => {
    if (isPanning) return;
    const st = getHitStation(e.clientX, e.clientY);
    if (st) {
        handleStationClick(st);
        showToast(`${visitedSet.has(st.name) ? '✅' : '⬜'} ${st.name}`);
    }
});

canvasEl.addEventListener('mousemove', (e) => {
    if (isPanning) {
        const dx = e.clientX - panStart.x;
        const dy = e.clientY - panStart.y;
        offsetX = lastOffset.x + dx / scale;
        offsetY = lastOffset.y + dy / scale;
        render();
        return;
    }

    const st = getHitStation(e.clientX, e.clientY);
    const prev = hoveredStation;
    hoveredStation = st ? st.name : null;

    if (hoveredStation !== prev) {
        render();
        canvasEl.style.cursor = hoveredStation ? 'pointer' : 'grab';
    }

    // Update tooltip
    if (st) {
        const lines = st.lines || [];
        const isVisited = visitedSet.has(st.name);
        tooltip.innerHTML = `
            <div class="tt-name">${st.name} ${isVisited ? '✅' : ''}</div>
            <div class="tt-lines">${lines.map(l => {
                const c = (linePaths.find(lp => lp.name === l) || {}).color || '#666';
                return `<span class="tt-line" style="background:${c}">${l}</span>`;
            }).join('')}</div>
            <div class="tt-hint">点击${isVisited ? '取消' : '打卡'} | ${lines.length}条线路${st.isTransfer ? ' | 换乘站' : ''}</div>
        `;
        tooltip.style.display = 'block';
        const rect = canvasEl.getBoundingClientRect();
        tooltip.style.left = (e.clientX - rect.left + 18) + 'px';
        tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
    } else {
        tooltip.style.display = 'none';
    }
});

canvasEl.addEventListener('mousedown', (e) => {
    if (e.button === 0) { // Left button
        isPanning = true;
        panStart = { x: e.clientX, y: e.clientY };
        lastOffset = { x: offsetX, y: offsetY };
        canvasEl.classList.add('panning');
    }
});

window.addEventListener('mouseup', () => {
    if (isPanning) {
        const dist = panStart ? Math.hypot(
            (lastOffset.x + (0) / scale) - offsetX,
            (lastOffset.y + (0) / scale) - offsetY
        ) : 0;
        isPanning = false;
        panStart = null;
        canvasEl.classList.remove('panning');
    }
});

canvasEl.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvasEl.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const worldBefore = screenToWorld(e.clientX, e.clientY);

    const zoomFactor = 1.1;
    const newScale = e.deltaY < 0
        ? Math.min(scale * zoomFactor, 10)
        : Math.max(scale / zoomFactor, 0.3);

    const ratio = newScale / scale;
    offsetX = offsetX + (worldBefore.x + offsetX) * (1 - ratio);
    offsetY = offsetY + (worldBefore.y + offsetY) * (1 - ratio);
    scale = newScale;

    render();
}, { passive: false });

// Touch support
let touchDist = null;
canvasEl.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
        isPanning = true;
        panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        lastOffset = { x: offsetX, y: offsetY };
    } else if (e.touches.length === 2) {
        isPanning = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchDist = Math.hypot(dx, dy);
    }
});

canvasEl.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isPanning) {
        offsetX = lastOffset.x + (e.touches[0].clientX - panStart.x) / scale;
        offsetY = lastOffset.y + (e.touches[0].clientY - panStart.y) / scale;
        render();
    } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const newDist = Math.hypot(dx, dy);
        if (touchDist) {
            const ratio = newDist / touchDist;
            const newScale = Math.min(10, Math.max(0.3, scale * ratio));
            const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            const world = screenToWorld(cx, cy);
            const r = newScale / scale;
            offsetX = offsetX + (world.x + offsetX) * (1 - r);
            offsetY = offsetY + (world.y + offsetY) * (1 - r);
            scale = newScale;
        }
        touchDist = newDist;
        render();
    }
}, { passive: false });

canvasEl.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
        isPanning = false;
        touchDist = null;
    }
});

// Zoom buttons
$('#zoom-in').addEventListener('click', () => {
    const rect = canvasEl.getBoundingClientRect();
    const world = screenToWorld(rect.left + rect.width/2, rect.top + rect.height/2);
    const newScale = Math.min(scale * 1.4, 10);
    const r = newScale / scale;
    offsetX = offsetX + (world.x + offsetX) * (1 - r);
    offsetY = offsetY + (world.y + offsetY) * (1 - r);
    scale = newScale;
    render();
});

$('#zoom-out').addEventListener('click', () => {
    const rect = canvasEl.getBoundingClientRect();
    const world = screenToWorld(rect.left + rect.width/2, rect.top + rect.height/2);
    const newScale = Math.max(scale / 1.4, 0.3);
    const r = newScale / scale;
    offsetX = offsetX + (world.x + offsetX) * (1 - r);
    offsetY = offsetY + (world.y + offsetY) * (1 - r);
    scale = newScale;
    render();
});

$('#zoom-fit').addEventListener('click', () => {
    fitToScreen();
    render();
});

// ===== Search =====
let searchTimeout;
searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(doSearch, 150);
});

searchInput.addEventListener('focus', () => {
    if (searchInput.value.trim()) doSearch();
});

function doSearch() {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { searchResults.classList.remove('show'); return; }

    const results = stationPositions
        .filter(s => s.name.toLowerCase().includes(q) ||
            s.lines.some(l => l.toLowerCase().includes(q)))
        .slice(0, 12);

    if (results.length === 0) {
        searchResults.innerHTML = '<div class="no-result">未找到匹配站点</div>';
    } else {
        searchResults.innerHTML = results.map(s => `
            <div class="item" data-name="${s.name}">
                <span>${s.name}</span>
                <span class="line-tags">${s.lines.slice(0,4).map(l => {
                    const c = (linePaths.find(lp => lp.name === l) || {}).color || '#666';
                    return `<span class="line-tag" style="background:${c}">${l}</span>`;
                }).join('')}</span>
            </div>
        `).join('');
    }
    searchResults.classList.add('show');
}

searchResults.addEventListener('click', (e) => {
    const item = e.target.closest('.item');
    if (!item) return;
    const name = item.dataset.name;
    flyToStation(name);
});

document.addEventListener('click', (e) => {
    if (!e.target.closest('#search-wrap')) searchResults.classList.remove('show');
});

function flyToStation(name) {
    const st = stationIndex[name];
    if (!st) return;

    searchInput.value = name;
    searchResults.classList.remove('show');

    const rect = canvasEl.getBoundingClientRect();
    const targetScale = Math.max(scale, 2.5);
    const targetOX = -(st.x) + (rect.width / targetScale) / 2;
    const targetOY = -(st.y) + (rect.height / targetScale) / 2;

    // Animate
    const startScale = scale, startOX = offsetX, startOY = offsetY;
    const duration = 600;
    const startTime = performance.now();

    function anim(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic
        scale = startScale + (targetScale - startScale) * ease;
        offsetX = startOX + (targetOX - startOX) * ease;
        offsetY = startOY + (targetOY - startOY) * ease;
        render();
        if (t < 1) requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);

    // Flash highlight
    hoveredStation = name;
    render();
    setTimeout(() => { hoveredStation = null; render(); }, 1500);
    showToast(`📍 ${name}`);
}

// Keyboard
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        searchInput.focus();
    }
    if (e.key === 'Escape') {
        searchResults.classList.remove('show');
        searchInput.blur();
    }
});

// ===== Stats =====
function refreshStats() {
    const total = stationPositions.length;
    const visited = visitedSet.size;
    const pct = total > 0 ? Math.round(visited / total * 1000) / 10 : 0;
    $('#total-progress').style.width = pct + '%';
    $('#total-pct').textContent = pct + '%';
    $('#total-count').textContent = `${visited} / ${total}`;
}

function refreshLineStats() {
    const container = $('#line-stats');
    const stats = linePaths.map(line => {
        const total = line.stations.length;
        let visited = 0;
        line.stations.forEach(s => { if (visitedSet.has(s)) visited++; });
        const pct = total > 0 ? Math.round(visited / total * 100) : 0;
        return { ...line, total, visited, pct };
    }).filter(s => s.total > 0)
      .sort((a, b) => b.pct - a.pct || b.total - a.total);

    container.innerHTML = stats.map(s => `
        <div class="line-stat" data-line="${s.name}" title="点击跳转到${s.name}">
            <span class="line-dot" style="background:${s.color}"></span>
            <span class="name">${s.shortName || s.name}</span>
            <span class="count">${s.visited}/${s.total}</span>
            <span class="pct">${s.pct}%</span>
        </div>
    `).join('');

    // Click to zoom to line
    container.querySelectorAll('.line-stat').forEach(el => {
        el.addEventListener('click', () => {
            const lineName = el.dataset.line;
            zoomToLine(lineName);
        });
        el.style.cursor = 'pointer';
    });
}

function zoomToLine(lineName) {
    const line = linePaths.find(l => l.name === lineName);
    if (!line || line.stations.length === 0) return;

    // Compute bounding box of stations on this line
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    line.stations.forEach(name => {
        const st = stationIndex[name];
        if (st) {
            minX = Math.min(minX, st.x);
            minY = Math.min(minY, st.y);
            maxX = Math.max(maxX, st.x);
            maxY = Math.max(maxY, st.y);
        }
    });

    if (!isFinite(minX)) return;

    const pad = 80;
    const worldW = maxX - minX + pad * 2;
    const worldH = maxY - minY + pad * 2;
    const rect = canvasEl.getBoundingClientRect();
    scale = Math.min(rect.width / worldW, rect.height / worldH, 3.5);
    offsetX = -(minX - pad) + (rect.width / scale - worldW) / 2;
    offsetY = -(minY - pad) + (rect.height / scale - worldH) / 2;
    render();
    showToast(`📍 ${lineName}`);
}

// ===== Data Management =====
function exportData() {
    const data = {
        type: 'beijing_subway_visited',
        visited: Array.from(visitedSet).sort(),
        count: visitedSet.size,
        exportedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `北京地铁足迹_${data.exportedAt.slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`已导出 ${data.count} 条记录`);
}

$('#btn-import').addEventListener('click', () => $('#import-file').click());
$('#import-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const data = JSON.parse(ev.target.result);
            const names = data.visited || [];
            if (!Array.isArray(names) || names.length === 0) {
                showToast('文件格式无效');
                return;
            }
            // Validate stations exist
            let added = 0;
            names.forEach(n => {
                if (stationIndex[n] && !visitedSet.has(n)) {
                    visitedSet.add(n);
                    added++;
                }
            });
            saveVisited();
            render();
            refreshStats();
            refreshLineStats();
            showToast(`导入完成，新增 ${added} 个打卡`);
        } catch(err) {
            showToast('文件解析失败');
        }
    };
    reader.readAsText(file);
    e.target.value = '';
});

$('#btn-clear').addEventListener('click', () => clearModal.classList.add('show'));
$('#confirm-clear').addEventListener('click', () => {
    visitedSet.clear();
    saveVisited();
    render();
    refreshStats();
    refreshLineStats();
    clearModal.classList.remove('show');
    showToast('数据已清除');
});

function closeModal() { clearModal.classList.remove('show'); }

$('#btn-export').addEventListener('click', exportData);

// ===== Init =====
async function main() {
    try {
        loadVisited();
        await loadData();
        resizeCanvas();
        fitToScreen();
        render();
        refreshStats();
        refreshLineStats();

        // Hide loading
        setTimeout(() => {
            loadingEl.classList.add('hidden');
            appEl.classList.add('ready');
            setTimeout(() => { loadingEl.style.display = 'none'; }, 400);
        }, 300);

    } catch(err) {
        loadingText.textContent = '加载失败：' + err.message + ' — 请刷新页面重试';
        console.error(err);
    }
}

// Resize handling
let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
        resizeCanvas();
        render();
    }, 200);
});

main();
})();
</script>
